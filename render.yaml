services:
  - type: web
    name: ecorisbanque
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: ecorisbanque-db
          property: connectionString

databases:
  - name: ecorisbanque-db
    plan: free
    databaseName: ecorisbanque
